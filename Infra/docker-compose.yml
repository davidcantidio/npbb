version: '3.9'
services:
  api:
    image: python:3.11-slim
    command: bash -c 'pip install fastapi uvicorn && uvicorn app.main:app --host 0.0.0.0 --port 8000'
    volumes:
      - ../backend:/code
    working_dir: /code
    ports:
      - '8000:8000'
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: npbb
      POSTGRES_PASSWORD: npbb
      POSTGRES_DB: npbb
    ports:
      - '5432:5432'

