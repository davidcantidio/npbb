services:
  - type: web
    name: npbb-api
    runtime: python
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash -lc "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: WORKER_DATABASE_URL
        sync: false
      - key: OBJECT_STORAGE_BACKEND
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        value: lead-imports
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_URL
        sync: false
      - key: SUPABASE_STORAGE_SERVICE_ROLE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/backend
      - key: FRONTEND_ORIGIN
        value: https://app.npbb.com.br
      - key: PUBLIC_APP_BASE_URL
        value: https://app.npbb.com.br
      - key: EMAIL_BACKEND
        value: console
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PASSWORD_RESET_URL
        value: https://app.npbb.com.br/reset-password
      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PASSWORD_RESET_TOKEN_SECRET
        generateValue: true
      - key: SQL_ECHO
        value: "false"
      - key: PUBLIC_LANDING_BASE_URL
        sync: false
      - key: PUBLIC_API_DOC_URL
        sync: false

  - type: worker
    name: npbb-leads-worker
    runtime: python
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_leads_worker.py
    envVars:
      - key: WORKER_DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src:/opt/render/project/src/backend
      - key: DB_REQUIRE_SUPABASE_POOLER
        value: "false"
      - key: OBJECT_STORAGE_BACKEND
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        value: lead-imports
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_URL
        sync: false
      - key: SUPABASE_STORAGE_SERVICE_ROLE_KEY
        sync: false
      - key: LEADS_WORKER_IDLE_SLEEP_SECONDS
        value: "2"
      - key: LEADS_WORKER_LOG_LEVEL
        value: INFO
