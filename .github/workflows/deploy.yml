name: Deploy VPS

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-vps-production
  cancel-in-progress: false

jobs:
  build-frontend-dist:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend dist
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Check frontend API base in bundle
        run: ./scripts/check_frontend_bundle_api_base.sh

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.event.workflow_run.head_sha }}
          path: frontend/dist
          if-no-files-found: error

  deploy:
    needs: build-frontend-dist
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_PORT: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH != '' && secrets.VPS_DEPLOY_PATH || '/opt/npbb/app' }}
      TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.event.workflow_run.head_sha }}
          path: frontend/dist

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Sync repository checkout
        run: |
          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_DEPLOY_PATH}"
          rsync -az --delete -e "ssh -p ${VPS_PORT}" \
            --exclude='.git' \
            --exclude='frontend/node_modules' \
            --exclude='backend/.venv' \
            --exclude='frontend/dist' \
            ./ "${VPS_USER}@${VPS_HOST}:${VPS_DEPLOY_PATH}/"

      - name: Sync frontend dist
        run: |
          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_DEPLOY_PATH}/frontend/dist"
          rsync -az --delete -e "ssh -p ${VPS_PORT}" \
            frontend/dist/ "${VPS_USER}@${VPS_HOST}:${VPS_DEPLOY_PATH}/frontend/dist/"

      - name: Deploy on VPS
        run: |
          ssh -p "${VPS_PORT}" "${VPS_USER}@${VPS_HOST}" "
            set -euo pipefail
            cd ${VPS_DEPLOY_PATH}
            git fetch origin
            git checkout --force ${TARGET_SHA}
            mkdir -p artifacts/phase-f4/evidence
            python3 scripts/write_gate_status.py --output artifacts/phase-f4/evidence/deploy.json --gate deploy --status FAIL --details ${TARGET_SHA}
            ./scripts/deploy_vps.sh /opt/npbb/env/.env.production
            docker compose --env-file /opt/npbb/env/.env.production -f Infra/production/docker-compose.yml exec -T backend alembic upgrade head
            PHASE_F4_EVIDENCE_DIR=${VPS_DEPLOY_PATH}/artifacts/phase-f4/evidence ./scripts/check_vps_health.sh /opt/npbb/env/.env.production
            PHASE_F4_EVIDENCE_DIR=${VPS_DEPLOY_PATH}/artifacts/phase-f4/evidence ./scripts/smoke_vps.sh /opt/npbb/env/.env.production
            python3 scripts/write_gate_status.py --output artifacts/phase-f4/evidence/deploy.json --gate deploy --status PASS --details ${TARGET_SHA}
            python3 scripts/render_phase_validation_summary.py --env-file /opt/npbb/env/.env.production --output artifacts/phase-f4/validation-summary.md
          "
