# Percentage checks for survey/social/media metrics.
percentage_checks:
  - dataset_id: stg_social_metrics
    table: stg_social_metrics
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    value_column: metric_value
    unit_column: unit
    percent_units: [percent]
    require_lineage: true
    lower_bound: 0
    upper_bound: 100
    sum_rules:
      - rule_id: social_percent_by_slide_platform
        group_by: [source_id, ingestion_id, slide_number, platform]
        target_sum: 100
        tolerance: 1
        min_items: 2

  - dataset_id: stg_dimac_metrics
    table: stg_dimac_metrics
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    value_column: metric_value
    unit_column: unit
    percent_units: [percent]
    status_column: status
    allowed_statuses: [ok]
    require_lineage: true
    lower_bound: 0
    upper_bound: 100
    sum_rules:
      - rule_id: dimac_percent_by_page
        group_by: [source_id, ingestion_id, pdf_page]
        target_sum: 100
        tolerance: 1
        min_items: 2

  - dataset_id: stg_mtc_metrics
    table: stg_mtc_metrics
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    value_column: metric_value
    unit_column: unit
    percent_units: [percent]
    status_column: status
    allowed_statuses: [ok]
    require_lineage: true
    lower_bound: 0
    upper_bound: 100
    sum_rules:
      - rule_id: mtc_percent_by_page
        group_by: [source_id, ingestion_id, pdf_page]
        target_sum: 100
        tolerance: 1
        min_items: 2

# Coverage matrix requirements by canonical session type.
# Used by `etl.validate.coverage_matrix` to compute status per session/dataset.
coverage_requirements:
  # Fallback requirements applied when a session type has no explicit mapping.
  default_required_datasets:
    - access_control
    - optin

  # Specific required datasets by canonical session type.
  required_datasets_by_session_type:
    NOTURNO_SHOW:
      - access_control
      - ticket_sales
      - optin
    DIURNO_GRATUITO:
      - access_control
      - leads
    OUTRO:
      - access_control
