# Data-quality dataset contracts for TMJ ETL checks.
#
# Each entry configures:
# - required_columns: schema contract
# - critical_not_null_columns: columns that cannot be NULL
# - source_id_column/lineage_ref_id_column: optional lineage hints in findings
# - ingestion_id_column: scope filtering by ingestion execution
datasets:
  - dataset_id: stg_optin
    table: stg_optin_transactions
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - sheet_name
      - row_number
      - raw_payload_json
    critical_not_null_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - sheet_name
      - row_number
      - raw_payload_json
    duplicate_key_sets:
      - [cpf_hash, evento, sessao]
      - [email_hash, evento, sessao]

  - dataset_id: stg_leads
    table: stg_leads
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - sheet_name
      - row_number
      - raw_payload_json
    critical_not_null_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - sheet_name
      - row_number
      - raw_payload_json
    duplicate_key_sets:
      - [cpf_hash, evento]
      - [email_hash, evento]
      - [person_key_hash, evento]

  - dataset_id: stg_access_control
    table: stg_access_control_sessions
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - pdf_page
      - session_name
      - raw_payload_json
    critical_not_null_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - pdf_page
      - session_name
      - raw_payload_json

  - dataset_id: stg_social_metrics
    table: stg_social_metrics
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - slide_number
      - platform
      - metric_name
      - metric_value
      - unit
      - evidence_text
      - raw_payload_json
    critical_not_null_columns:
      - source_id
      - ingestion_id
      - lineage_ref_id
      - slide_number
      - platform
      - metric_name
      - metric_value
      - unit
      - evidence_text
      - raw_payload_json

  - dataset_id: stg_dimac_metrics
    table: stg_dimac_metrics
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - metric_key
      - status
      - extraction_rule
      - raw_payload_json
    critical_not_null_columns:
      - source_id
      - ingestion_id
      - metric_key
      - status
      - extraction_rule
      - raw_payload_json

  - dataset_id: stg_mtc_metrics
    table: stg_mtc_metrics
    domain: staging
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - source_id
      - ingestion_id
      - metric_key
      - status
      - extraction_rule
      - raw_payload_json
    critical_not_null_columns:
      - source_id
