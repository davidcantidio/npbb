services:
  - type: web
    name: npbb-api
    runtime: python
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: FRONTEND_ORIGIN
        value: https://npbb.pages.dev
      - key: PUBLIC_APP_BASE_URL
        value: https://npbb.pages.dev
      - key: EMAIL_BACKEND
        value: console
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PASSWORD_RESET_URL
        value: https://npbb.pages.dev/reset-password
      - key: PASSWORD_RESET_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: PASSWORD_RESET_TOKEN_SECRET
        generateValue: true
      - key: SQL_ECHO
        value: "false"
      - key: PUBLIC_LANDING_BASE_URL
        sync: false
      - key: PUBLIC_API_DOC_URL
        sync: false
