  - dataset_id: fct_attendance_access_control
    table: attendance_access_control
    domain: canonical
    severity: error
    ingestion_id_column: ingestion_id
    source_id_column: source_id
    lineage_ref_id_column: lineage_ref_id
    required_columns:
      - session_id
      - source_id
      - ingestion_id
      - lineage_ref_id
