services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - npbb_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      SQL_ECHO: ${SQL_ECHO:-false}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL}
      PUBLIC_LANDING_BASE_URL: ${PUBLIC_LANDING_BASE_URL}
      PUBLIC_API_DOC_URL: ${PUBLIC_API_DOC_URL}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_SSL: ${SMTP_SSL:-false}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL}
      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-60}
      PASSWORD_RESET_TOKEN_SECRET: ${PASSWORD_RESET_TOKEN_SECRET}
      PASSWORD_RESET_DEBUG: ${PASSWORD_RESET_DEBUG:-false}
      USER_REGISTRATION_MODE: ${USER_REGISTRATION_MODE:-public}
      USER_REGISTRATION_INVITE_TOKEN: ${USER_REGISTRATION_INVITE_TOKEN:-}
      USER_REGISTRATION_RATE_LIMIT_MAX: ${USER_REGISTRATION_RATE_LIMIT_MAX:-30}
      USER_REGISTRATION_RATE_LIMIT_WINDOW_SEC: ${USER_REGISTRATION_RATE_LIMIT_WINDOW_SEC:-60}
      FORGOT_PASSWORD_RATE_LIMIT_MAX: ${FORGOT_PASSWORD_RATE_LIMIT_MAX:-20}
      FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SEC: ${FORGOT_PASSWORD_RATE_LIMIT_WINDOW_SEC:-60}
      SEED_PASSWORD: "${SEED_PASSWORD:-Senha123!}"
      PYTHONPATH: /app
      ENV: ${ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      API_ROOT_PATH: "${API_ROOT_PATH-/api}"
      TZ: ${TZ:-America/Sao_Paulo}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  edge:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      DEPLOY_MODE: ${DEPLOY_MODE:-ip}
      APP_DOMAIN: ${APP_DOMAIN:-app.example.com}
      API_DOMAIN: ${API_DOMAIN:-api.example.com}
      ENABLE_TLS: ${ENABLE_TLS:-false}
      TLS_CERT_PATH: ${TLS_CERT_PATH:-/etc/nginx/certs/origin.crt}
      TLS_KEY_PATH: ${TLS_KEY_PATH:-/etc/nginx/certs/origin.key}
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
      - "${EDGE_HTTPS_PORT:-443}:443"
    volumes:
      - type: bind
        source: ${CERTS_DIR:-/opt/npbb/certs}
        target: /etc/nginx/certs
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_FILE_PREFIX: ${BACKUP_FILE_PREFIX:-npbb}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - type: bind
        source: ${BACKUP_HOST_DIR:-/opt/npbb/backups/postgres}
        target: /backups

volumes:
  npbb_postgres_data:
