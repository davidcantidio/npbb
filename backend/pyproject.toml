[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".venv",
  "node_modules",
  ".pytest_cache",
  "__pycache__",
  "test-results",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
markers = [
    "postgres: integração com PostgreSQL real (variável NPBB_POSTGRES_TEST_URL)",
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unreachable = false
check_untyped_defs = false
disable_error_code = [
  "arg-type",
  "assignment",
  "attr-defined",
  "prop-decorator",
  "return-value",
  "typeddict-item",
  "union-attr",
  "unreachable",
  "var-annotated",
]
