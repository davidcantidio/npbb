version: 1
description: "Contratos de output para views mart_report_* do TMJ 2025."
views:
  - name: mart_report_healthcheck
    description: "View minima para validar pipeline de apply/contract."
    columns:
      - name: section_key
        type: text
      - name: status
        type: text
      - name: generated_at
        type: text
  - name: mart_report_attendance_by_session
    description: "Attendance por sessao para DOCX (controle de acesso)."
    columns:
      - name: event_id
        type: integer
      - name: session_id
        type: integer
      - name: session_key
        type: text
      - name: session_name
        type: text
      - name: session_type
        type: text
      - name: session_date
        type: text
      - name: session_start_at
        type: text
      - name: ingressos_validos
        type: integer
      - name: presentes
        type: integer
      - name: ausentes
        type: integer
      - name: invalidos
        type: integer
      - name: bloqueados
        type: integer
      - name: comparecimento_pct
        type: real
      - name: metric_type
        type: text
      - name: audience_measure
        type: text
      - name: session_rank
        type: integer
  - name: mart_report_presale_curves
